services:
  - type: web
    name: klymates-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python init_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: klymates-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: WEATHER_API_KEY
        value: 38d3327a894343a587d160644251610
      - key: PYTHONPATH
        value: .

databases:
  - name: klymates-db
    plan: free
